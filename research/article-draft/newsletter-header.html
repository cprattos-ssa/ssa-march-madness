<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Newsletter Header - March Madness</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;800;900&family=DM+Sans:wght@400;500;600&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #111;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
  }

  .header {
    width: 1280px;
    height: 720px;
    position: relative;
    overflow: hidden;
    background: #1a2332;
  }

  /* Court floor texture */
  .court-floor {
    position: absolute;
    inset: 0;
    background:
      linear-gradient(165deg, #2a1f10 0%, #1a1510 35%, #1a2332 70%);
    opacity: 1;
  }

  .court-floor::before {
    content: '';
    position: absolute;
    inset: 0;
    background:
      repeating-linear-gradient(
        90deg,
        transparent,
        transparent 38px,
        rgba(180,140,60,0.03) 38px,
        rgba(180,140,60,0.03) 40px
      );
  }

  /* Court lines */
  .court-lines {
    position: absolute;
    inset: 0;
    overflow: hidden;
  }

  .court-lines::before {
    content: '';
    position: absolute;
    bottom: -200px;
    left: 50%;
    transform: translateX(-50%);
    width: 600px;
    height: 600px;
    border: 2px solid rgba(255,255,255,0.06);
    border-radius: 50%;
  }

  .court-lines::after {
    content: '';
    position: absolute;
    bottom: 0;
    left: 50%;
    transform: translateX(-50%);
    width: 380px;
    height: 220px;
    border: 2px solid rgba(255,255,255,0.05);
    border-bottom: none;
    border-radius: 190px 190px 0 0;
  }

  .halfcourt-line {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    height: 2px;
    background: rgba(255,255,255,0.04);
    top: 72%;
  }

  .three-point-line {
    position: absolute;
    bottom: -400px;
    right: -100px;
    width: 900px;
    height: 900px;
    border: 2px solid rgba(255,255,255,0.04);
    border-radius: 50%;
  }

  /* Scatter plot background */
  .scatter-container {
    position: absolute;
    inset: 0;
    overflow: hidden;
  }

  .scatter-dot {
    position: absolute;
    border-radius: 50%;
    background: rgba(200,160,60,0.15);
  }

  .scatter-dot.miss {
    background: rgba(220,60,60,0.2);
  }

  /* Faded trend line */
  .trend-line {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
  }

  /* Arena light glow */
  .arena-glow {
    position: absolute;
    top: -300px;
    left: 50%;
    transform: translateX(-50%);
    width: 1200px;
    height: 800px;
    background: radial-gradient(ellipse, rgba(255,180,40,0.08) 0%, transparent 70%);
    pointer-events: none;
  }

  .arena-glow-2 {
    position: absolute;
    top: -100px;
    right: -200px;
    width: 800px;
    height: 600px;
    background: radial-gradient(ellipse, rgba(180,60,60,0.06) 0%, transparent 60%);
    pointer-events: none;
  }

  /* Grain overlay */
  .grain {
    position: absolute;
    inset: 0;
    opacity: 0.3;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.5'/%3E%3C/svg%3E");
    background-size: 128px 128px;
    pointer-events: none;
    mix-blend-mode: overlay;
  }

  /* Vignette */
  .vignette {
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse at center, transparent 40%, rgba(0,0,0,0.5) 100%);
    pointer-events: none;
  }

  /* Content */
  .content {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    padding: 40px 100px;
    padding-bottom: 80px;
    z-index: 10;
    text-align: center;
  }

  /* Logo lockup top-left */
  .logo-lockup {
    position: absolute;
    top: 36px;
    left: 44px;
    display: flex;
    align-items: center;
    gap: 14px;
    z-index: 11;
  }

  .logo-icon {
    width: 44px;
    height: 44px;
    object-fit: contain;
    border-radius: 50%;
  }

  .logo-text {
    font-family: 'DM Sans', sans-serif;
    font-size: 16px;
    font-weight: 600;
    color: rgba(255,255,255,0.8);
    letter-spacing: 3px;
    text-transform: uppercase;
  }

  .title {
    font-family: 'Playfair Display', serif;
    font-weight: 800;
    font-size: 58px;
    line-height: 1.08;
    color: #fff;
    max-width: 1300px;
    text-shadow: 0 4px 60px rgba(0,0,0,0.6);
    letter-spacing: -1px;
  }

  .title .highlight {
    color: rgba(220,180,80,0.95);
  }

  .title .worse {
    color: #d44;
    font-style: italic;
  }

  .divider {
    width: 120px;
    height: 3px;
    background: linear-gradient(90deg, transparent, rgba(220,180,80,0.6), transparent);
    margin: 24px 0;
  }

  .subtitle-bottom {
    font-family: 'DM Sans', sans-serif;
    font-size: 26px;
    font-weight: 400;
    color: rgba(255,255,255,0.55);
    max-width: 800px;
    line-height: 1.5;
    letter-spacing: 0.3px;
  }

  /* Bottom bar */
  .bottom-bar {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    height: 6px;
    background: linear-gradient(90deg, #1a1208, rgba(220,180,80,0.7), #d44, rgba(220,180,80,0.7), #1a1208);
  }

  /* Axis labels faded */
  .axis-label {
    position: absolute;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    color: rgba(255,255,255,0.08);
    letter-spacing: 2px;
    text-transform: uppercase;
  }

  .axis-y {
    left: 60px;
    top: 50%;
    transform: rotate(-90deg) translateX(-50%);
    transform-origin: left center;
  }

  .axis-x {
    bottom: 50px;
    right: 120px;
  }

  /* Grid lines faded */
  .grid-lines {
    position: absolute;
    inset: 0;
    overflow: hidden;
  }

  .grid-h, .grid-v {
    position: absolute;
    background: rgba(255,255,255,0.015);
  }

  .grid-h {
    left: 0; right: 0; height: 1px;
  }

  .grid-v {
    top: 0; bottom: 0; width: 1px;
  }
</style>
</head>
<body>

<div class="header">
  <div class="court-floor"></div>

  <div class="court-lines">
    <div class="halfcourt-line"></div>
    <div class="three-point-line"></div>
  </div>

  <!-- Faded grid -->
  <div class="grid-lines">
    <div class="grid-h" style="top: 20%"></div>
    <div class="grid-h" style="top: 40%"></div>
    <div class="grid-h" style="top: 60%"></div>
    <div class="grid-h" style="top: 80%"></div>
    <div class="grid-v" style="left: 20%"></div>
    <div class="grid-v" style="left: 40%"></div>
    <div class="grid-v" style="left: 60%"></div>
    <div class="grid-v" style="left: 80%"></div>
  </div>

  <!-- Scatter plot dots -->
  <div class="scatter-container">
    <svg class="trend-line" viewBox="0 0 1920 1080" preserveAspectRatio="none">
      <!-- Faded trend line going up-right -->
      <line x1="200" y1="850" x2="1700" y2="250" stroke="rgba(220,180,80,0.07)" stroke-width="2" stroke-dasharray="12,8"/>
      <!-- Second trend line -->
      <line x1="200" y1="900" x2="1700" y2="350" stroke="rgba(220,60,60,0.05)" stroke-width="2" stroke-dasharray="8,12"/>
    </svg>

    <!-- Normal dots (correct predictions) -->
    <div class="scatter-dot" style="width:8px;height:8px;left:12%;top:65%"></div>
    <div class="scatter-dot" style="width:10px;height:10px;left:15%;top:58%"></div>
    <div class="scatter-dot" style="width:7px;height:7px;left:18%;top:72%"></div>
    <div class="scatter-dot" style="width:9px;height:9px;left:22%;top:54%"></div>
    <div class="scatter-dot" style="width:6px;height:6px;left:25%;top:68%"></div>
    <div class="scatter-dot" style="width:11px;height:11px;left:28%;top:48%"></div>
    <div class="scatter-dot" style="width:7px;height:7px;left:32%;top:62%"></div>
    <div class="scatter-dot" style="width:8px;height:8px;left:35%;top:55%"></div>
    <div class="scatter-dot" style="width:10px;height:10px;left:38%;top:44%"></div>
    <div class="scatter-dot" style="width:6px;height:6px;left:42%;top:58%"></div>
    <div class="scatter-dot" style="width:9px;height:9px;left:45%;top:50%"></div>
    <div class="scatter-dot" style="width:7px;height:7px;left:48%;top:66%"></div>
    <div class="scatter-dot" style="width:8px;height:8px;left:52%;top:42%"></div>
    <div class="scatter-dot" style="width:11px;height:11px;left:55%;top:52%"></div>
    <div class="scatter-dot" style="width:6px;height:6px;left:58%;top:60%"></div>
    <div class="scatter-dot" style="width:9px;height:9px;left:62%;top:38%"></div>
    <div class="scatter-dot" style="width:7px;height:7px;left:65%;top:56%"></div>
    <div class="scatter-dot" style="width:10px;height:10px;left:68%;top:45%"></div>
    <div class="scatter-dot" style="width:8px;height:8px;left:72%;top:52%"></div>
    <div class="scatter-dot" style="width:6px;height:6px;left:75%;top:40%"></div>
    <div class="scatter-dot" style="width:9px;height:9px;left:78%;top:48%"></div>
    <div class="scatter-dot" style="width:7px;height:7px;left:82%;top:36%"></div>
    <div class="scatter-dot" style="width:8px;height:8px;left:85%;top:44%"></div>

    <!-- Miss dots (red, larger) -->
    <div class="scatter-dot miss" style="width:14px;height:14px;left:20%;top:78%"></div>
    <div class="scatter-dot miss" style="width:16px;height:16px;left:40%;top:82%"></div>
    <div class="scatter-dot miss" style="width:13px;height:13px;left:55%;top:76%"></div>
    <div class="scatter-dot miss" style="width:15px;height:15px;left:70%;top:80%"></div>
    <div class="scatter-dot miss" style="width:14px;height:14px;left:83%;top:74%"></div>
  </div>

  <div class="arena-glow"></div>
  <div class="arena-glow-2"></div>

  <!-- Faded axis labels -->
  <div class="axis-label axis-y">Brier Score</div>
  <div class="axis-label axis-x">Player Features Added</div>

  <div class="vignette"></div>
  <div class="grain"></div>

  <!-- Logo top-left -->
  <div class="logo-lockup">
    <img class="logo-icon" src="lighthouse-icon.png" alt="SSA"/>
    <span class="logo-text">South Shore Analytics</span>
  </div>

  <div class="content">
    <h1 class="title">
      We Added <span class="highlight">30,000</span> Player Records<br>
      to Our March Madness Model.<br>
      It Got <span class="worse">Worse.</span>
    </h1>
  </div>

  <div class="bottom-bar"></div>
</div>

</body>
</html>
